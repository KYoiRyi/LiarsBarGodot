name: "Godot Manual Export All"
on: [push, workflow_dispatch]

jobs:
  export:
    name: Export All Platforms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Android Keystore
        run: |
          keytool -keypass android -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -genkey -alias androiddebugkey -keystore debug.keystore -keyalg RSA

      - name: Install Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          unzip Godot_v4.2.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.2.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable/
          unzip Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.1.stable/

      - name: Configure Godot Editor Settings for Android
        run: |
          godot --headless -e -q --quit || true
          sed -i "s|export/android/android_sdk_path = \".*\"|export/android/android_sdk_path = \"${ANDROID_SDK_ROOT}\"|g" ~/.config/godot/editor_settings-4.tres
          sed -i "s|export/android/debug_keystore = \".*\"|export/android/debug_keystore = \"${GITHUB_WORKSPACE}/debug.keystore\"|g" ~/.config/godot/editor_settings-4.tres

      - name: Export Windows Server
        run: |
          mkdir -p export/windows
          godot --headless --export-release "Windows" export/windows/server.exe

      - name: Export Linux Server
        run: |
          mkdir -p export/linux
          godot --headless --export-release "LinuxX11" export/linux/server.x86_64

      - name: Export Android APK
        run: |
          mkdir -p export/android
          godot --headless --export-debug "Android" export/android/liars_bar.apk

      - name: Upload Windows Server
        uses: actions/upload-artifact@v4
        with:
          name: LiarsBar-WindowsServer
          path: export/windows/

      - name: Upload Linux Server
        uses: actions/upload-artifact@v4
        with:
          name: LiarsBar-LinuxServer
          path: export/linux/

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: LiarsBar-AndroidClient
          path: export/android/
